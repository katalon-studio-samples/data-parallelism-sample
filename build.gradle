plugins {
  id 'java'
  id "com.katalon.gradle-plugin" version "0.1.2"
}

repositories {
  mavenCentral()
}

dependencies {
  implementation 'net.datafaker:datafaker:2.5.4'
  implementation 'org.xerial:sqlite-jdbc:3.46.1.3'
}

// Katalon Store plugin metadata. Run `./gradlew katalonPluginPackage` to
// produce a distributable JAR under build/libs/.
group = 'com.katalon.dataparallelism'
version = '0.1.0'